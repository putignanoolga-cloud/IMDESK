<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Im·Desk — Agenda Immobiliare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F4FA;--bg-2:#E4EBF5;--bg-3:#D8E3F0;--white:#ffffff;
  --border:#C8D6EA;--border-2:#A0B8D8;
  --gold:#E8721A;--gold-dark:#C05A0A;--gold-light:#FEF0E6;--gold-mid:#F0904A;
  --terra:#C0392B;--terra-bg:#FCECEA;
  --text-1:#0D1B2E;--text-2:#1E3A5F;--text-3:#4A6A8A;--text-4:#7A9AB8;--text-5:#A8C0D4;
  --todo-color:#1A4A9E;--oggi-color:#C0392B;--sett-color:#E8721A;--mese-color:#1A7A4A;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-pill:20px;
  --font-serif:'DM Serif Display',Georgia,serif;--font-sans:'DM Sans',system-ui,sans-serif;
  --tr:.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text-1);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:1200px;margin:0 auto}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:62px;background:#0D1B2E;border-bottom:1px solid #1E3A5F;position:sticky;top:0;z-index:50}
.logo{font-family:var(--font-serif);font-size:21px;color:#ffffff;user-select:none;flex-shrink:0}
.logo em{font-style:italic;color:var(--gold)}
.nav-pills{display:flex;gap:3px;background:#1E3A5F;padding:4px;border-radius:var(--r-pill)}
.nav-btn{padding:6px 18px;border-radius:var(--r-pill);font-size:12.5px;font-family:var(--font-sans);border:none;cursor:pointer;color:#7A9AB8;background:transparent;transition:var(--tr);white-space:nowrap}
.nav-btn.active{background:#E8721A;color:#ffffff;font-weight:500;box-shadow:0 2px 8px rgba(232,114,26,.4)}
.topbar-date{font-size:11px;color:#7A9AB8;letter-spacing:.05em;flex-shrink:0}

.page{display:none;flex:1}.page.active{display:block}

/* HERO */
.hero{display:flex;align-items:flex-end;justify-content:space-between;padding:28px 28px 24px;border-bottom:1px solid var(--border);gap:20px;background:var(--white)}
.hero-eyebrow{font-size:10px;color:var(--text-4);letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}
.hero-title{font-family:var(--font-serif);font-size:30px;line-height:1.18;color:var(--text-1)}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-stats{display:flex;gap:8px;flex-shrink:0}
.stat-card{background:var(--white);border:2px solid var(--border);border-radius:var(--r-md);padding:12px 16px;text-align:right;min-width:80px;transition:var(--tr)}
.stat-card.clickable{cursor:pointer}
.stat-card.clickable:hover{border-color:var(--gold);background:var(--gold-light);transform:translateY(-2px);box-shadow:0 4px 12px rgba(232,114,26,.2)}
.stat-num{font-family:var(--font-serif);font-size:22px;color:var(--text-1);line-height:1}
.stat-num.accent{color:var(--gold)}
.stat-label{font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:.09em;margin-top:3px}
.stat-hint{font-size:9px;color:var(--text-5);margin-top:2px}

/* TO DO BAR */
.todo-bar-wrap{padding:18px 28px 0;border-bottom:1px solid var(--border);background:var(--white)}
.todo-bar-title{font-size:10px;color:var(--text-4);letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px;font-weight:500}
.todo-input-row{display:flex;gap:8px;margin-bottom:12px}
.todo-input{flex:1;font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--white);color:var(--text-1);font-family:var(--font-sans);transition:border-color var(--tr)}
.todo-input:focus{outline:none;border-color:var(--gold-mid)}
.todo-date-input{font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--white);color:var(--text-1);font-family:var(--font-sans);width:140px}
.todo-date-input:focus{outline:none;border-color:var(--gold-mid)}
.todo-add-btn{padding:8px 16px;border:none;border-radius:var(--r-sm);background:#E8721A;color:var(--white);font-size:13px;cursor:pointer;font-weight:500;font-family:var(--font-sans);transition:var(--tr);white-space:nowrap;box-shadow:0 2px 6px rgba(232,114,26,.3)}
.todo-add-btn:hover{background:#C05A0A;box-shadow:0 4px 12px rgba(232,114,26,.4)}
.todo-list{padding-bottom:14px}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--bg-2)}
.todo-item:last-child{border-bottom:none}
.todo-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border-2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.todo-check:hover{border-color:var(--gold)}.todo-check.done{border-color:var(--gold)}
.todo-check.done::after{content:'✓';font-size:10px;font-weight:700;color:var(--gold)}
.todo-body{flex:1;min-width:0}
.todo-text{font-size:13px;color:var(--text-2);line-height:1.4;font-weight:500}
.todo-text.done{text-decoration:line-through;color:var(--text-5)}
.todo-expand{font-size:10px;color:var(--text-5);cursor:pointer;margin-top:4px;transition:transform var(--tr);flex-shrink:0;padding:0 3px}
.todo-expand.open{transform:rotate(90deg)}
.todo-del{width:18px;height:18px;border-radius:50%;border:none;background:transparent;color:var(--text-5);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);flex-shrink:0}
.todo-del:hover{background:var(--terra-bg);color:var(--terra)}
.sub-todo-wrap{margin:4px 0 4px 28px;border-left:1.5px solid var(--border);padding-left:10px}
.sub-todo-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--bg-2)}
.sub-todo-row:last-child{border-bottom:none}
.sub-todo-check{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border-2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.sub-todo-check:hover{border-color:var(--gold)}.sub-todo-check.done{border-color:var(--gold)}
.sub-todo-check.done::after{content:'✓';font-size:8px;font-weight:700;color:var(--gold)}
.sub-todo-text{flex:1;font-size:12px;color:var(--text-2);font-weight:400}.sub-todo-text.done{text-decoration:line-through;color:var(--text-5)}
.sub-todo-dead{font-size:10px;color:var(--text-4);white-space:nowrap}
.sub-todo-del{width:14px;height:14px;border-radius:50%;border:none;background:transparent;color:var(--text-5);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.sub-todo-del:hover{color:var(--terra)}
.sub-todo-add-row{display:flex;gap:6px;padding:5px 0 2px}
.sub-todo-input{flex:1;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--white);color:var(--text-1);font-family:var(--font-sans)}
.sub-todo-input:focus{outline:none;border-color:var(--gold-mid)}
.sub-todo-date{font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--white);color:var(--text-1);font-family:var(--font-sans);width:120px}
.sub-todo-btn{padding:5px 10px;border:none;border-radius:var(--r-sm);background:var(--gold);color:var(--white);font-size:11px;cursor:pointer;font-family:var(--font-sans);white-space:nowrap}

/* DEADLINE BADGE */
.deadline-badge{font-size:11px;white-space:nowrap;padding:2px 8px;border-radius:10px;background:var(--bg-2);color:var(--text-3);flex-shrink:0;margin-top:3px}
.deadline-badge.oggi{background:#FEEDE9;color:var(--terra);font-weight:500}
.deadline-badge.urgente{background:var(--gold-light);color:var(--gold);font-weight:500}
.deadline-badge.scaduto{background:var(--terra-bg);color:var(--terra)}

/* CALENDARIO */
.cal-wrap{padding:22px 28px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-family:var(--font-serif);font-size:16px;color:var(--text-1)}
.cal-controls{display:flex;gap:6px;align-items:center}
.cal-nav{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text-3);display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.cal-nav:hover{border-color:var(--gold);color:var(--gold)}
.cal-view-toggle{display:flex;gap:2px;background:var(--bg-3);padding:3px;border-radius:var(--r-pill)}
.cal-view-btn{padding:4px 12px;border-radius:var(--r-pill);font-size:11px;font-family:var(--font-sans);border:none;cursor:pointer;color:var(--text-3);background:transparent;transition:var(--tr)}
.cal-view-btn.active{background:var(--white);color:var(--text-1);font-weight:500}
.cal-grid-month{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;font-size:10px;color:var(--text-4);letter-spacing:.06em;text-transform:uppercase;padding:4px 0 6px}
.cal-day{min-height:52px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:5px;cursor:pointer;transition:border-color var(--tr),background var(--tr)}
.cal-day:hover{border-color:var(--gold-mid);background:var(--gold-light)}
.cal-day.other-month{background:transparent;border-color:transparent;cursor:default}
.cal-day.other-month:hover{background:transparent;border-color:transparent}
.cal-day.today-cell{border-color:var(--gold)!important}
.cal-day.selected-cell{background:var(--gold-light);border-color:var(--gold)!important}
.cal-day-num{font-size:11px;font-weight:500;color:var(--text-3);margin-bottom:3px}
.cal-day.today-cell .cal-day-num{color:var(--gold);font-weight:700}
.cal-day.other-month .cal-day-num{color:var(--text-5)}
.cal-dot-wrap{display:flex;flex-wrap:wrap;gap:2px}
.cal-dot{height:5px;border-radius:3px;flex:1;min-width:5px;max-width:100%}
.cal-dot.col-todo{background:var(--todo-color)}
.cal-dot.col-oggi{background:var(--oggi-color)}
.cal-dot.col-sett{background:var(--sett-color)}
.cal-dot.col-mese{background:var(--mese-color)}
.cal-dot.done-dot{opacity:.3}
.cal-grid-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-week-day{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px;min-height:80px;cursor:pointer;transition:border-color var(--tr),background var(--tr)}
.cal-week-day:hover{border-color:var(--gold-mid);background:var(--gold-light)}
.cal-week-day.today-cell{border-color:var(--gold)}
.cal-week-day.selected-cell{background:var(--gold-light);border-color:var(--gold)!important}
.cal-week-header{display:flex;flex-direction:column;align-items:center;margin-bottom:6px}
.cal-week-dn{font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:.06em}
.cal-week-num{font-size:16px;font-family:var(--font-serif);color:var(--text-1);line-height:1}
.cal-week-day.today-cell .cal-week-num{color:var(--gold)}
.cal-event{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:white;font-weight:500}
.cal-event.col-todo{background:var(--todo-color)}.cal-event.col-oggi{background:var(--oggi-color)}
.cal-event.col-sett{background:var(--sett-color)}.cal-event.col-mese{background:var(--mese-color)}
.cal-event.done-event{opacity:.4;text-decoration:line-through}
.cal-legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-3)}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* DAY POPUP */
.day-popup{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;margin-top:8px;display:none}
.day-popup.visible{display:block}
.day-popup-title{font-family:var(--font-serif);font-size:15px;color:var(--text-1);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.day-popup-close{font-size:14px;color:var(--text-4);cursor:pointer;border:none;background:transparent;padding:0 2px}
.day-popup-close:hover{color:var(--text-1)}
.day-event-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bg-2)}
.day-event-row:last-child{border-bottom:none}
.day-event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.day-event-text{flex:1;font-size:13px;color:var(--text-2)}
.day-event-text.done{color:var(--text-5);text-decoration:line-through}
.day-event-group{font-size:10px;color:var(--text-4);white-space:nowrap}
.day-popup-empty{font-size:13px;color:var(--text-4);text-align:center;padding:12px 0}

/* PRIORITIES LIST (sotto cal) */
.priorities-list-wrap{padding:18px 28px 24px;border-bottom:1px solid var(--border);background:var(--white)}
.priorities-list-title{font-size:10px;color:var(--text-5);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;font-weight:500}
.pri-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bg-2)}
.pri-row:last-child{border-bottom:none}
.pri-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border-2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.pri-check:hover{border-color:var(--gold)}.pri-check.done{border-color:var(--gold)}
.pri-check.done::after{content:'✓';font-size:10px;font-weight:700;color:var(--gold)}
.pri-check.urgent{border-color:var(--terra)}
.pri-dot-inner{width:6px;height:6px;border-radius:50%;background:var(--terra)}
.pri-text{flex:1;font-size:13px;color:var(--text-2);font-weight:500}.pri-text.done{color:var(--text-5);text-decoration:line-through}
.pri-group-tag{font-size:10px;padding:2px 7px;border-radius:8px;white-space:nowrap}
.tag-oggi{background:#FEEDE9;color:var(--terra)}.tag-settimana{background:var(--gold-light);color:var(--gold-dark)}.tag-mese{background:#EEF4E8;color:#4A7A2E}
.pri-expand{font-size:10px;color:var(--text-5);cursor:pointer;padding:0 3px;transition:transform var(--tr)}
.pri-expand.open{transform:rotate(90deg)}
.pri-subtask-wrap{margin:2px 0 4px 27px;border-left:1.5px solid var(--border);padding-left:10px}
.pri-sub-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--bg-2)}
.pri-sub-row:last-child{border-bottom:none}
.pri-sub-check{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border-2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.pri-sub-check:hover{border-color:var(--gold)}.pri-sub-check.done{border-color:var(--gold)}
.pri-sub-check.done::after{content:'✓';font-size:8px;font-weight:700;color:var(--gold)}
.pri-sub-text{flex:1;font-size:12px;color:var(--text-2)}.pri-sub-text.done{color:var(--text-5);text-decoration:line-through}
.add-pri-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.add-pri-input{flex:1;font-size:13px;padding:7px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--white);color:var(--text-1);font-family:var(--font-sans);min-width:140px}
.add-pri-input:focus{outline:none;border-color:var(--gold-mid)}
.add-pri-date{font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--white);color:var(--text-1);font-family:var(--font-sans);width:130px}
.add-pri-select{font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--white);color:var(--text-1);font-family:var(--font-sans)}
.add-pri-btn{padding:7px 16px;border:none;border-radius:var(--r-sm);background:var(--gold);color:var(--white);font-size:13px;cursor:pointer;font-weight:500;font-family:var(--font-sans);transition:var(--tr);white-space:nowrap}
.add-pri-btn:hover{background:var(--gold-dark)}

/* PRATICHE */
.pratiche-wrap{padding:22px 28px;max-width:860px}
.pratica-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;overflow:hidden;transition:border-color var(--tr)}
.pratica-card:hover{border-color:var(--border-2)}
.pratica-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:12px}
.pratica-status{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.status-open{background:var(--gold-mid)}.status-done{background:var(--gold)}
.pratica-names{flex:1}
.pratica-title{font-family:var(--font-serif);font-size:15px;color:var(--text-1);line-height:1.3}
.pratica-title em{font-style:italic;color:var(--gold)}
.pratica-addr{font-size:11px;color:var(--text-4);margin-top:2px}
.pratica-right{text-align:right;flex-shrink:0}
.pratica-val{font-family:var(--font-serif);font-size:15px;color:var(--text-1)}
.pratica-mediazione{font-size:11px;color:var(--gold);margin-top:1px}
.pratica-expand{font-size:12px;color:var(--text-5);transition:transform var(--tr)}
.pratica-expand.open{transform:rotate(90deg)}
.pratica-body{border-top:1px solid var(--border)}
.ptabs{display:flex;border-bottom:1px solid var(--bg-2)}
.ptab{flex:1;padding:9px 10px;text-align:center;font-size:12px;color:var(--text-4);cursor:pointer;border-bottom:2px solid transparent;transition:var(--tr);font-family:var(--font-sans)}
.ptab:hover{color:var(--text-2)}.ptab.active{color:var(--text-1);border-bottom-color:var(--gold);font-weight:500}
.ptab-content{padding:14px 16px}
.doc-row{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--bg-2)}
.doc-row:last-child{border-bottom:none}
.doc-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border-2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.doc-check:hover{border-color:var(--gold)}.doc-check.checked{background:var(--gold);border-color:var(--gold)}
.doc-check.checked::after{content:'✓';color:var(--white);font-size:10px;font-weight:500}
.doc-label{flex:1;font-size:13px;color:var(--text-2)}.doc-label.done{color:var(--text-5);text-decoration:line-through}
.doc-del{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--text-5);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);flex-shrink:0}
.doc-del:hover{background:var(--terra-bg);color:var(--terra)}
.pay-row{display:flex;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--bg-2);gap:10px}
.pay-row:last-child{border-bottom:none}
.pay-body{flex:1}.pay-desc{font-size:13px;color:var(--text-2)}.pay-meta{font-size:11px;color:var(--text-4);margin-top:1px}
.pay-note{font-size:11px;color:var(--text-4);font-style:italic;margin-top:1px}
.pay-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.pay-amt{font-family:var(--font-serif);font-size:15px;color:var(--text-1);white-space:nowrap}
.pay-tag{font-size:10px;padding:2px 7px;border-radius:8px;white-space:nowrap}
.tag-compravendita{background:var(--gold-light);color:var(--gold-dark)}
.tag-med-vend{background:#E8F4E8;color:#2E6B2E}
.tag-med-acq{background:#E8EEF8;color:#2E4A8B}
.tag-spesa{background:var(--bg-2);color:var(--text-3)}
.pay-del{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--text-5);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);flex-shrink:0}
.pay-del:hover{background:var(--terra-bg);color:var(--terra)}
.totale-section{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.totale-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.totale-label{font-size:12px;color:var(--text-3)}.totale-val{font-family:var(--font-serif);font-size:16px}
.totale-val.gold{color:var(--gold)}.totale-val.red{color:var(--terra)}.totale-val.green{color:#4A7A2E}
.saldo-ok{font-size:11px;color:var(--gold);padding:4px 0}
.section-divider{font-size:10px;color:var(--text-5);letter-spacing:.12em;text-transform:uppercase;margin:12px 0 6px;padding-top:8px;border-top:1px solid var(--bg-2)}

/* MEDIAZIONE BOX — doppio */
.med-box{background:var(--gold-light);border:1px solid #E8D5B5;border-radius:var(--r-sm);padding:14px;margin-bottom:14px}
.med-box-title{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.09em;font-weight:500;margin-bottom:12px}
.med-party-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.med-party{background:var(--white);border:1px solid var(--border-2);border-radius:var(--r-sm);padding:10px}
.med-party-label{font-size:11px;font-weight:500;color:var(--text-2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.med-field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.med-field:last-child{margin-bottom:0}
.med-field label{font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:.06em}
.med-field input,.med-field select{font-size:13px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text-1);font-family:var(--font-sans);width:100%}
.med-field input:focus{outline:none;border-color:var(--gold)}
.med-result{font-family:var(--font-serif);font-size:15px;color:var(--gold-dark);margin-top:4px}
.med-result-netto{font-size:12px;color:var(--text-3)}
.med-totale-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0 0;border-top:1px solid #E8D5B5;margin-top:4px}
.med-totale-label{font-size:12px;color:var(--text-2);font-weight:500}
.med-totale-val{font-family:var(--font-serif);font-size:18px;color:var(--gold-dark)}
.med-note-wrap{margin-top:10px}
.med-note-wrap label{font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.med-note-input{width:100%;font-size:12px;padding:7px 9px;border:1px solid var(--border-2);border-radius:var(--r-sm);background:var(--white);color:var(--text-1);font-family:var(--font-sans);resize:vertical;min-height:48px}
.med-note-input:focus{outline:none;border-color:var(--gold)}

/* MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(26,22,18,.3);z-index:200;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;width:420px;max-width:95vw;animation:fadeUp .2s ease both;max-height:90vh;overflow-y:auto}
.modal h3{font-family:var(--font-serif);font-size:21px;margin-bottom:18px;color:var(--text-1)}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text-1);font-family:var(--font-sans);transition:border-color var(--tr)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold-mid)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-cancel{padding:8px 16px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;font-size:13px;cursor:pointer;color:var(--text-3);font-family:var(--font-sans);transition:var(--tr)}
.btn-cancel:hover{background:var(--bg-2)}
.btn-save{padding:8px 20px;border:none;border-radius:var(--r-sm);background:#E8721A;color:var(--white);font-size:13px;cursor:pointer;font-weight:500;font-family:var(--font-sans);transition:var(--tr);box-shadow:0 2px 6px rgba(232,114,26,.3)}
.btn-save:hover{background:#C05A0A}

/* MEDIAZIONI DETAIL MODAL */
.med-detail-row{padding:10px 0;border-bottom:1px solid var(--bg-2)}
.med-detail-row:last-child{border-bottom:none}
.med-detail-pratica{font-family:var(--font-serif);font-size:14px;color:var(--text-1);margin-bottom:4px}
.med-detail-line{display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);padding:2px 0}
.med-detail-total{font-family:var(--font-serif);font-size:15px;font-weight:400}
.med-grand-total{margin-top:12px;padding-top:10px;border-top:1.5px solid var(--border-2);display:flex;justify-content:space-between;align-items:center}
.med-grand-label{font-size:13px;font-weight:500;color:var(--text-1)}
.med-grand-val{font-family:var(--font-serif);font-size:22px;color:var(--gold-dark)}

/* CRONOLOGIA */
.crono-wrap{padding:22px 28px}
.crono-filter{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.crono-filter-btn{padding:5px 14px;border-radius:var(--r-pill);font-size:12px;font-family:var(--font-sans);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text-3);transition:var(--tr)}
.crono-filter-btn.active{background:var(--gold);border-color:var(--gold);color:var(--white)}
.crono-group{margin-bottom:22px}
.crono-group-title{font-size:11px;color:var(--text-4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.crono-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--bg-2)}
.crono-item:last-child{border-bottom:none}
.crono-icon{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px}
.icon-priority{background:var(--gold-light);color:var(--gold)}.icon-pratica{background:#EEF4E8;color:#4A7A2E}
.icon-doc{background:#EDF2FB;color:#3A62A7}.icon-payment{background:var(--terra-bg);color:var(--terra)}
.icon-todo{background:#EDF2FB;color:var(--todo-color)}
.crono-body{flex:1}.crono-title{font-size:13px;color:var(--text-2);line-height:1.4}.crono-meta{font-size:11px;color:var(--text-4);margin-top:2px}
.crono-time{font-size:11px;color:var(--text-5);flex-shrink:0;margin-top:3px}
.crono-empty{text-align:center;padding:48px 20px;color:var(--text-4);font-size:14px}

/* BOTTOMBAR */
.bottombar{background:#0D1B2E;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #1E3A5F}
.add-actions{display:flex;gap:18px}
.add-quick{font-size:12px;color:#E8721A;cursor:pointer;border:none;background:transparent;font-family:var(--font-sans);transition:color var(--tr);padding:0}
.add-quick:hover{color:var(--gold-dark)}
.version{font-size:10px;color:#4A6A8A;letter-spacing:.08em}
.add-pratica-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border:1px dashed var(--border-2);border-radius:var(--r-md);background:transparent;font-size:13px;cursor:pointer;width:100%;color:var(--text-3);font-family:var(--font-sans);margin-top:4px;transition:var(--tr)}
.add-pratica-btn:hover{border-color:#E8721A;color:#E8721A;background:var(--gold-light)}
.empty{text-align:left;padding:12px 0;color:var(--text-4);font-size:13px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:700px){
  .topbar{padding:0 14px}.topbar-date{display:none}.nav-btn{padding:5px 10px;font-size:11px}
  .hero{padding:18px 14px 16px;flex-direction:column;align-items:flex-start}.hero-stats{width:100%}.stat-card{flex:1;text-align:left}
  .todo-bar-wrap,.cal-wrap,.priorities-list-wrap,.pratiche-wrap,.crono-wrap{padding-left:14px;padding-right:14px}
  .todo-input-row{flex-wrap:wrap}.todo-date-input{width:100%}
  .med-party-grid{grid-template-columns:1fr}.add-pri-row{flex-wrap:wrap}
  .bottombar{padding:10px 14px}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="logo">Im<em>·</em>Desk</div>
    <nav class="nav-pills">
      <button class="nav-btn active" onclick="showPage('agenda',this)">Agenda</button>
      <button class="nav-btn" onclick="showPage('pratiche',this)">Pratiche</button>
      <button class="nav-btn" onclick="showPage('cronologia',this)">Cronologia</button>
    </nav>
    <div class="topbar-date" id="topbar-date"></div>
  </header>

  <!-- AGENDA -->
  <div id="page-agenda" class="page active">
    <div class="hero">
      <div>
        <div class="hero-eyebrow" id="hero-saluto">Buongiorno</div>
        <div class="hero-title" id="hero-title">Caricamento…</div>
      </div>
      <div class="hero-stats">
        <div class="stat-card clickable" onclick="focusTodo()" title="Vai ai To Do">
          <div class="stat-num accent" id="stat-todo">0</div>
          <div class="stat-label">To Do</div>
          <div class="stat-hint">↗ vai alla lista</div>
        </div>
        <div class="stat-card clickable" onclick="showPage('pratiche',document.querySelectorAll('.nav-btn')[1])" title="Vai alle Pratiche">
          <div class="stat-num" id="stat-pratiche">0</div>
          <div class="stat-label">Pratiche</div>
          <div class="stat-hint">↗ vai alle pratiche</div>
        </div>
        <div class="stat-card clickable" onclick="openMedDetail()" title="Clicca per il dettaglio">
          <div class="stat-num" id="stat-mediazioni">—</div>
          <div class="stat-label">Mediazioni</div>
          <div class="stat-hint">netto agente · ↗</div>
        </div>
      </div>
    </div>

    <!-- TO DO BAR -->
    <div class="todo-bar-wrap">
      <div class="todo-bar-title">To Do</div>
      <div class="todo-input-row">
        <input class="todo-input" id="todo-main-input" placeholder="Aggiungi un'azione da fare…" onkeydown="if(event.key==='Enter')addTodo()">
        <input class="todo-date-input" id="todo-main-date" type="date">
        <button class="todo-add-btn" onclick="addTodo()">＋ Aggiungi</button>
      </div>
      <div class="todo-list" id="todo-list"></div>
    </div>

    <!-- CALENDARIO -->
    <div class="cal-wrap">
      <div class="cal-header">
        <div class="cal-title" id="cal-title"></div>
        <div class="cal-controls">
          <button class="cal-nav" onclick="calNav(-1)">‹</button>
          <button class="cal-nav" onclick="calNav(1)">›</button>
          <div class="cal-view-toggle">
            <button class="cal-view-btn active" id="btn-view-mese" onclick="setCalView('mese')">Mese</button>
            <button class="cal-view-btn" id="btn-view-sett" onclick="setCalView('settimana')">Settimana</button>
          </div>
        </div>
      </div>
      <div id="cal-body"></div>
      <!-- DAY POPUP -->
      <div class="day-popup" id="day-popup">
        <div class="day-popup-title">
          <span id="day-popup-title-text">Attività del giorno</span>
          <button class="day-popup-close" onclick="closeDayPopup()">✕</button>
        </div>
        <div id="day-popup-content"></div>
      </div>
      <div class="cal-legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--todo-color)"></div> To Do</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--oggi-color)"></div> Priorità oggi</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--sett-color)"></div> Settimana</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--mese-color)"></div> Mese</div>
      </div>
    </div>

    <!-- PRIORITIES LIST -->
    <div class="priorities-list-wrap">
      <div class="priorities-list-title">Priorità — tutte</div>
      <div id="priorities-all-list"></div>
      <div class="add-pri-row">
        <input class="add-pri-input" id="add-pri-title" placeholder="Nuova priorità…" onkeydown="if(event.key==='Enter')addPriority()">
        <input class="add-pri-date" id="add-pri-date" type="date">
        <select class="add-pri-select" id="add-pri-group">
          <option value="oggi">Oggi</option>
          <option value="settimana">Settimana</option>
          <option value="mese">Mese</option>
        </select>
        <button class="add-pri-btn" onclick="addPriority()">＋</button>
      </div>
    </div>
  </div>

  <!-- PRATICHE -->
  <div id="page-pratiche" class="page">
    <div class="pratiche-wrap">
      <div id="pratiche-list"></div>
      <button class="add-pratica-btn" onclick="openAddPratica()">＋ Nuova pratica</button>
    </div>
  </div>

  <!-- CRONOLOGIA -->
  <div id="page-cronologia" class="page">
    <div class="crono-wrap">
      <div class="crono-filter">
        <button class="crono-filter-btn active" onclick="setCronoFilter('tutti',this)">Tutti</button>
        <button class="crono-filter-btn" onclick="setCronoFilter('todo',this)">To Do</button>
        <button class="crono-filter-btn" onclick="setCronoFilter('priorita',this)">Priorità</button>
        <button class="crono-filter-btn" onclick="setCronoFilter('pratiche',this)">Pratiche</button>
        <button class="crono-filter-btn" onclick="setCronoFilter('documenti',this)">Documenti</button>
        <button class="crono-filter-btn" onclick="setCronoFilter('pagamenti',this)">Pagamenti</button>
      </div>
      <div id="crono-list"></div>
    </div>
  </div>

  <footer class="bottombar">
    <div class="add-actions">
      <button class="add-quick" onclick="focusTodo()">＋ To Do</button>
      <button class="add-quick" onclick="showPage('pratiche',document.querySelectorAll('.nav-btn')[1]);openAddPratica()">＋ Nuova pratica</button>
    </div>
    <div class="version">ImDesk v1.0 · uso personale</div>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box"></div>
</div>

<script>
const DOCS_ACQ_DEFAULT=["Documento d'identità","Codice fiscale","Stato civile / estratto atto di matrimonio","Procura notarile (se necessaria)","Proposta d'acquisto firmata","Preliminare di compravendita","Compromesso registrato","Documentazione mutuo / pre-approvazione banca","Copia assegni / bonifici caparra","Recapiti e PEC"];
const DOCS_VEND_DEFAULT=["Documento d'identità","Codice fiscale","Atto di provenienza immobile","Visura catastale aggiornata","Planimetria catastale","Certificato di agibilità","APE (Attestato Prestazione Energetica)","Documenti condominiali / liberatoria morosità","Cancellazione ipoteche","Copia chiavi e attestati impianti"];

let state={todos:[],priorities:{oggi:[],settimana:[],mese:[]},pratiche:[],cronologia:[]};
try{const s=localStorage.getItem('imdesk_v6');if(s)state=JSON.parse(s);}catch(e){}
['todos','cronologia'].forEach(k=>{if(!state[k])state[k]=[];});
function save(){try{localStorage.setItem('imdesk_v6',JSON.stringify(state));}catch(e){}}
function logEvent(tipo,titolo,dettaglio){
  state.cronologia.unshift({id:Date.now(),tipo,titolo,dettaglio,ts:new Date().toISOString()});
  if(state.cronologia.length>300)state.cronologia=state.cronologia.slice(0,300);
}

// ── DATE ──
const GG=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const GG_S=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MM=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
const MM_C=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
function nowDate(){const d=new Date();d.setHours(0,0,0,0);return d;}
function isoDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(s){if(!s)return'';const d=new Date(s);return d.getDate()+'/'+(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(2);}
function fmtDateLong(s){if(!s)return'';const d=new Date(s);return GG[d.getDay()]+' '+d.getDate()+' '+MM[d.getMonth()]+' '+d.getFullYear();}
function fmtEur(n){return(n||0).toLocaleString('it-IT');}
function fmtTs(s){if(!s)return'';const d=new Date(s);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function deadlineInfo(s){
  if(!s)return{label:'',cls:''};
  const today=nowDate();const d=new Date(s);d.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  if(diff<0)return{label:'Scaduto',cls:'scaduto'};
  if(diff===0)return{label:'Oggi',cls:'oggi'};
  if(diff<=3)return{label:'Tra '+diff+'g',cls:'urgente'};
  return{label:fmtDate(s),cls:''};
}
function updateDate(){
  const d=new Date();
  document.getElementById('topbar-date').textContent=GG[d.getDay()]+', '+d.getDate()+' '+MM[d.getMonth()]+' '+d.getFullYear();
  const h=d.getHours();
  document.getElementById('hero-saluto').textContent=h<12?'Buongiorno':h<18?'Buon pomeriggio':'Buonasera';
}

// ── TO DO ──
function focusTodo(){
  showPage('agenda',document.querySelectorAll('.nav-btn')[0]);
  setTimeout(()=>{const i=document.getElementById('todo-main-input');if(i){i.focus();i.scrollIntoView({behavior:'smooth'});}},100);
}
function addTodo(){
  const inp=document.getElementById('todo-main-input');const dat=document.getElementById('todo-main-date');
  const t=(inp.value||'').trim();if(!t)return;
  state.todos.push({id:Date.now(),title:t,deadline:dat.value||'',done:false,open:false,subtodos:[]});
  logEvent('todo','To Do aggiunto',t);inp.value='';dat.value=isoDate(nowDate());
  save();renderTodos();renderCal();updateStats();
}
function toggleTodo(id){
  const t=state.todos.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;
  if(t.done){t.subtodos.forEach(s=>s.done=true);logEvent('todo','To Do completato',t.title);}
  else t.subtodos.forEach(s=>s.done=false);
  save();renderTodos();renderCal();updateStats();
}
function deleteTodo(id){
  state.todos=state.todos.filter(x=>x.id!==id);
  save();renderTodos();renderCal();updateStats();
}
function toggleTodoExpand(id){
  const t=state.todos.find(x=>x.id===id);if(!t)return;t.open=!t.open;renderTodos();
}
function addSubTodo(pid){
  const ti=document.getElementById('sub-todo-input-'+pid);const di=document.getElementById('sub-todo-date-'+pid);
  if(!ti)return;const text=ti.value.trim();if(!text)return;
  const p=state.todos.find(x=>x.id===pid);if(!p)return;
  p.subtodos.push({id:Date.now(),title:text,deadline:di?di.value:'',done:false});
  logEvent('todo','Sotto To Do aggiunto',text);save();renderTodos();renderCal();
}
function toggleSubTodo(pid,sid){
  const p=state.todos.find(x=>x.id===pid);if(!p)return;
  const s=p.subtodos.find(x=>x.id===sid);if(!s)return;
  s.done=!s.done;if(s.done)logEvent('todo','Sotto To Do completato',s.title);
  save();renderTodos();renderCal();updateStats();
}
function editTodo(id){
  const t=state.todos.find(x=>x.id===id);if(!t)return;
  openModal(`<h3>Modifica to do</h3>
    <div class="field"><label>Titolo</label><input id="et-title" value="${t.title}"></div>
    <div class="field"><label>Scadenza</label><input id="et-date" type="date" value="${t.deadline||''}"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn-save" onclick="saveEditTodo(${id})">Salva</button>
    </div>`);
}
function saveEditTodo(id){
  const t=state.todos.find(x=>x.id===id);if(!t)return;
  const title=(document.getElementById('et-title').value||'').trim();
  if(!title)return;
  t.title=title;
  t.deadline=document.getElementById('et-date').value||'';
  save();closeModal();renderTodos();renderCal();updateStats();
}
function deleteSubTodo(pid,sid){
  const p=state.todos.find(x=>x.id===pid);if(!p)return;
  p.subtodos=p.subtodos.filter(x=>x.id!==sid);save();renderTodos();renderCal();
}
function renderTodos(){
  const el=document.getElementById('todo-list');if(!el)return;
  const visible=state.todos.filter(t=>!t.done);
  if(!visible.length){
    const doneCount=state.todos.filter(t=>t.done).length;
    el.innerHTML=`<div class="empty">${doneCount>0?'Tutti i to do completati ✓ — <span style="color:var(--gold);cursor:pointer" onclick="showPage(\'cronologia\',document.querySelectorAll(\'.nav-btn\')[2])">vedi in cronologia</span>':'Nessun to do — aggiungine uno sopra.'}</div>`;
    return;
  }
  el.innerHTML=visible.map(t=>{
    const di=deadlineInfo(t.deadline);
    const badge=di.label?`<span class="deadline-badge ${di.cls}">${di.label}</span>`:'';
    const subsHtml=t.subtodos.map(s=>{
      const sdi=deadlineInfo(s.deadline);
      return`<div class="sub-todo-row">
        <div class="sub-todo-check ${s.done?'done':''}" onclick="toggleSubTodo(${t.id},${s.id})"></div>
        <span class="sub-todo-text ${s.done?'done':''}" style="font-weight:400">${s.title}</span>

  logEvent('priorita','Priorità aggiunta',t);
  document.getElementById('add-pri-title').value='';
  save();renderPrioritiesAll();renderCal();updateStats();
}
function togglePriority(group,id){
  const p=state.priorities[group].find(x=>x.id===id);if(!p)return;
  p.done=!p.done;
  if(p.done){p.subtasks.forEach(s=>s.done=true);logEvent('priorita','Priorità completata',p.title);}
  else p.subtasks.forEach(s=>s.done=false);
  save();renderPrioritiesAll();renderCal();updateStats();
}
function togglePriExpand(group,id){
  const p=state.priorities[group].find(x=>x.id===id);if(!p)return;p.open=!p.open;renderPrioritiesAll();
}
function addSubPri(group,pid){
  const ti=document.getElementById('sub-pri-input-'+pid);const di=document.getElementById('sub-pri-date-'+pid);
  if(!ti)return;const text=ti.value.trim();if(!text)return;
  const p=state.priorities[group].find(x=>x.id===pid);if(!p)return;
  p.subtasks.push({id:Date.now(),title:text,deadline:di?di.value:'',done:false});p.open=true;
  logEvent('priorita','Sotto-priorità aggiunta',text);save();renderPrioritiesAll();renderCal();
}
function toggleSubPri(group,pid,sid){

  s.done=!s.done;if(s.done)logEvent('priorita','Sotto-priorità completata',s.title);

}

const GROUP_TAG={oggi:'tag-oggi',settimana:'tag-settimana',mese:'tag-mese'};
const GROUP_LABEL={oggi:'Oggi',settimana:'Settimana',mese:'Mese'};

function renderPrioritiesAll(){
  const el=document.getElementById('priorities-all-list');if(!el)return;
  const all=[];
  ['oggi','settimana','mese'].forEach(g=>{state.priorities[g].filter(p=>!p.done).forEach(p=>all.push({...p,group:g}));});
  // Sort: scadute/urgenti prima, poi per data, poi senza data
  all.sort((a,b)=>{
    if(!a.deadline&&!b.deadline)return 0;
    if(!a.deadline)return 1;if(!b.deadline)return -1;
    return new Date(a.deadline)-new Date(b.deadline);
  });
  if(!all.length){el.innerHTML='<div class="empty">Nessuna priorità. Aggiungine una qui sotto.</div>';return;}
  el.innerHTML=all.map(p=>{
    const di=deadlineInfo(p.deadline);
    const badge=di.label?`<span class="deadline-badge ${di.cls}">${di.label}</span>`:'';
    const isUrgent=(di.cls==='urgente'||di.cls==='scaduto')&&!p.done;
    const visibleSubs=p.done?[]:p.subtasks;
    const subsHtml=visibleSubs.map(s=>{
      const sdi=deadlineInfo(s.deadline);
      return`<div class="pri-sub-row">
        <div class="pri-sub-check ${s.done?'done':''}" onclick="toggleSubPri('${p.group}',${p.id},${s.id})"></div>
        <span class="pri-sub-text ${s.done?'done':''}">${s.title}</span>
        ${sdi.label?`<span class="sub-todo-dead">${sdi.label}</span>`:''}
      </div>`;
    }).join('');
    const addSubHtml=!p.done?`<div class="sub-todo-add-row" style="margin-top:4px">
      <input class="sub-todo-input" id="sub-pri-input-${p.id}" placeholder="Sotto-priorità…" onkeydown="if(event.key==='Enter')addSubPri('${p.group}',${p.id})">
      <input class="sub-todo-date" id="sub-pri-date-${p.id}" type="date">
      <button class="sub-todo-btn" onclick="addSubPri('${p.group}',${p.id})">＋</button>
    </div>`:'';
    return`<div>
      <div class="pri-row">
        <div class="pri-check ${p.done?'done':isUrgent?'urgent':''}" onclick="togglePriority('${p.group}',${p.id})">${isUrgent&&!p.done?'<div class="pri-dot-inner"></div>':''}</div>
        <span class="pri-text ${p.done?'done':''}" style="font-weight:500">${p.title}</span>
        <span class="pri-group-tag ${GROUP_TAG[p.group]}">${GROUP_LABEL[p.group]}</span>
        ${badge}
        ${!p.done&&p.subtasks.length?`<span class="pri-expand ${p.open?'open':''}" onclick="togglePriExpand('${p.group}',${p.id})">▶</span>`:''}
      </div>
      ${p.open&&!p.done?`<div class="pri-subtask-wrap">${subsHtml}${addSubHtml}</div>`:''}
    </div>`;
  }).join('');
}

let calView='mese',calOffset=0,selectedDay=null;
function setCalView(v){calView=v;calOffset=0;selectedDay=null;closeDayPopup();
  document.getElementById('btn-view-mese').classList.toggle('active',v==='mese');
  document.getElementById('btn-view-sett').classList.toggle('active',v==='settimana');
  renderCal();}
function calNav(dir){calOffset+=dir;selectedDay=null;closeDayPopup();renderCal();}
function closeDayPopup(){const p=document.getElementById('day-popup');if(p)p.classList.remove('visible');selectedDay=null;}

function getAllCalEvents(){
  const evs=[];
  state.todos.forEach(t=>{
    if(t.deadline)evs.push({date:t.deadline,title:t.title,group:'todo',done:t.done,isMain:true,parent:null});
    t.subtodos.forEach(s=>{if(s.deadline)evs.push({date:s.deadline,title:s.title,group:'todo',done:s.done||t.done,isMain:false,parent:t.title});});
  });
  ['oggi','settimana','mese'].forEach(g=>{
    state.priorities[g].forEach(p=>{
      if(p.deadline)evs.push({date:p.deadline,title:p.title,group:g,done:p.done,isMain:true,parent:null});
      p.subtasks.forEach(s=>{if(s.deadline)evs.push({date:s.deadline,title:s.title,group:g,done:s.done||p.done,isMain:false,parent:p.title});});
    });
  });
  return evs;
}

function groupColor(g){return g==='todo'?'col-todo':g==='oggi'?'col-oggi':g==='settimana'?'col-sett':'col-mese';}
function groupDotColor(g){return g==='todo'?'var(--todo-color)':g==='oggi'?'var(--oggi-color)':g==='settimana'?'var(--sett-color)':'var(--mese-color)';}
const GROUP_NAME_DISPLAY={todo:'To Do',oggi:'Priorità oggi',settimana:'Settimana',mese:'Mese'};

function clickDay(dateStr){
  if(selectedDay===dateStr){closeDayPopup();return;}
  selectedDay=dateStr;
  // update selected class
  document.querySelectorAll('.cal-day,.cal-week-day').forEach(el=>el.classList.remove('selected-cell'));
  document.querySelectorAll(`[data-date="${dateStr}"]`).forEach(el=>el.classList.add('selected-cell'));
  const evs=getAllCalEvents().filter(e=>e.date===dateStr);
  const popup=document.getElementById('day-popup');
  const titleEl=document.getElementById('day-popup-title-text');
  const content=document.getElementById('day-popup-content');
  titleEl.textContent=fmtDateLong(dateStr);
  if(!evs.length){
    content.innerHTML='<div class="day-popup-empty">Nessuna attività in questo giorno</div>';
  } else {
    content.innerHTML=evs.map(e=>`
      <div class="day-event-row">
        <div class="day-event-dot" style="background:${groupDotColor(e.group)}"></div>
        <div style="flex:1;min-width:0">
          <div class="day-event-text ${e.done?'done':''}" style="font-weight:${e.isMain?'500':'400'}">${e.title}</div>
          ${e.parent?`<div style="font-size:10px;color:var(--text-4);margin-top:1px">↳ ${e.parent}</div>`:''}
        </div>
        <span class="day-event-group">${GROUP_NAME_DISPLAY[e.group]||e.group}</span>
      </div>`).join('');
  }
  popup.classList.add('visible');
  popup.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderCal(){
  const body=document.getElementById('cal-body');const titleEl=document.getElementById('cal-title');
  if(!body||!titleEl)return;
  const evs=getAllCalEvents();const today=nowDate();
  if(calView==='mese'){
    const ref=new Date(today.getFullYear(),today.getMonth()+calOffset,1);
    titleEl.textContent=MM_C[ref.getMonth()]+' '+ref.getFullYear();
    const firstDay=(ref.getDay()+6)%7;
    const daysInMonth=new Date(ref.getFullYear(),ref.getMonth()+1,0).getDate();
    let html='<div class="cal-grid-month">';
    ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].forEach(d=>{html+=`<div class="cal-day-name">${d}</div>`;});
    for(let i=0;i<firstDay;i++)html+=`<div class="cal-day other-month"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const ds=isoDate(new Date(ref.getFullYear(),ref.getMonth(),d));
      const isToday=ds===isoDate(today);const isSel=ds===selectedDay;
      const dayEvs=evs.filter(e=>e.date===ds);
      const dots=dayEvs.filter(e=>!e.done).map(e=>`<div class="cal-dot ${groupColor(e.group)}" title="${e.title}"></div>`).join('');
      html+=`<div class="cal-day${isToday?' today-cell':''}${isSel?' selected-cell':''}" data-date="${ds}" onclick="clickDay('${ds}')">
        <div class="cal-day-num">${d}</div>
        <div class="cal-dot-wrap">${dots}</div>
      </div>`;
    }
    html+='</div>';body.innerHTML=html;
  } else {
    const dow=(today.getDay()+6)%7;const monday=new Date(today);monday.setDate(today.getDate()-dow+calOffset*7);
    const end=new Date(monday);end.setDate(monday.getDate()+6);
    titleEl.textContent=monday.getDate()+' '+MM[monday.getMonth()]+' – '+end.getDate()+' '+MM[end.getMonth()]+' '+end.getFullYear();
    let html='<div class="cal-grid-week">';
    for(let i=0;i<7;i++){
      const day=new Date(monday);day.setDate(monday.getDate()+i);
      const ds=isoDate(day);const isToday=ds===isoDate(today);const isSel=ds===selectedDay;
      const dayEvs=evs.filter(e=>e.date===ds);
      const evHtml=dayEvs.filter(e=>!e.done).map(e=>`<div class="cal-event ${groupColor(e.group)}">${e.title}</div>`).join('');
      html+=`<div class="cal-week-day${isToday?' today-cell':''}${isSel?' selected-cell':''}" data-date="${ds}" onclick="clickDay('${ds}')">
        <div class="cal-week-header"><div class="cal-week-dn">${GG_S[day.getDay()]}</div><div class="cal-week-num">${day.getDate()}</div></div>
        ${evHtml}</div>`;
    }
    html+='</div>';body.innerHTML=html;
  }
}

    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Annulla</button><button class="btn-save" onclick="savePayment(${pid})">Aggiungi</button></div>`);
}
function savePayment(pid){
  const tipo=document.getElementById('m-tipo').value;const desc=document.getElementById('m-desc').value.trim();
  const amt=parseFloat(document.getElementById('m-amt').value)||0;const met=document.getElementById('m-met').value;
  const dt=document.getElementById('m-pdate').value;const note=document.getElementById('m-note').value.trim();
  if(!desc||!amt)return;
  const p=state.pratiche.find(x=>x.id===pid);
  if(p)p.payments.push({id:Date.now(),tipo,desc,amount:amt,method:met,date:dt,note});
  logEvent('pagamento','Pagamento registrato','€ '+fmtEur(amt)+' · '+desc);
  save();closeModal();renderPratiche();updateStats();
}
function deletePayment(pid,payId){
  const p=state.pratiche.find(x=>x.id===pid);if(!p)return;
  p.payments=p.payments.filter(x=>x.id!==payId);save();renderPratiche();updateStats();
}

// Mediazione live (per venditore e acquirente separati)
function updateMed(pid){
  const p=state.pratiche.find(x=>x.id===pid);if(!p)return;
  const f=id=>parseFloat((document.getElementById(id)||{}).value)||0;
  p.pctMedVend=f('med-pct-vend-'+pid);p.pctNettoVend=f('med-netto-vend-'+pid);
  p.pctMedAcq=f('med-pct-acq-'+pid);p.pctNettoAcq=f('med-netto-acq-'+pid);
  p.noteMedVend=(document.getElementById('med-note-vend-'+pid)||{}).value||'';
  p.noteMedAcq=(document.getElementById('med-note-acq-'+pid)||{}).value||'';
  // Keep legacy field for preview
  p.percentualeMediazione=(p.pctMedVend+p.pctMedAcq)/2;
  save();
  const lordoV=Math.round(p.valore*(p.pctMedVend/100));const nettoV=Math.round(lordoV*(p.pctNettoVend/100));
  const lordoA=Math.round(p.valore*(p.pctMedAcq/100));const nettoA=Math.round(lordoA*(p.pctNettoAcq/100));
  const upd=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  upd('med-res-lv-'+pid,'€ '+fmtEur(lordoV));upd('med-res-nv-'+pid,p.pctNettoVend>0?'netto € '+fmtEur(nettoV):'');
  upd('med-res-la-'+pid,'€ '+fmtEur(lordoA));upd('med-res-na-'+pid,p.pctNettoAcq>0?'netto € '+fmtEur(nettoA):'');
  const tot=lordoV+lordoA;upd('med-tot-'+pid,'€ '+fmtEur(tot));
  updateStats();
}

// ── STATS ──
function updateStats(){
  // Mediazioni homepage = somma netti agente (% secondaria) su tutte le pratiche aperte
  const totNetto=state.pratiche.reduce((a,p)=>{
    const lordoV=Math.round((p.valore||0)*((p.pctMedVend||0)/100));
    const nettoV=Math.round(lordoV*((p.pctNettoVend||0)/100));
    const lordoA=Math.round((p.valore||0)*((p.pctMedAcq||0)/100));
    const nettoA=Math.round(lordoA*((p.pctNettoAcq||0)/100));
    return a+nettoV+nettoA;
  },0);
  const el=document.getElementById('stat-mediazioni');if(el)el.textContent=totNetto>0?'€'+(totNetto>=1000000?(totNetto/1000000).toFixed(1)+'M':totNetto>=1000?Math.round(totNetto/1000)+'k':totNetto):'—';
  const elT=document.getElementById('stat-todo');if(elT)elT.textContent=state.todos.filter(t=>!t.done).length;
  const elP=document.getElementById('stat-pratiche');if(elP)elP.textContent=state.pratiche.filter(p=>p.status==='open').length;
  const todoC=state.todos.filter(t=>!t.done).length;const pratAp=state.pratiche.filter(p=>p.status==='open').length;
  let title='';
  if(todoC===0&&pratAp===0)title='Tutto in regola.<br>Ottimo lavoro!';
  else if(todoC===0)title=`Nessun to do pendente<br>e <em>${pratAp} ${pratAp===1?'pratica aperta':'pratiche aperte'}</em>`;
  else title=`Hai <em>${todoC} to do</em> pendenti${pratAp>0?'<br>e '+pratAp+' '+(pratAp===1?'pratica aperta':'pratiche aperte'):''}`;
  const ht=document.getElementById('hero-title');if(ht)ht.innerHTML=title;
}

// ── RENDER ALL ──
function renderAll(){
  renderTodos();renderCal();renderPrioritiesAll();updateStats();
}

// ── RENDER PRATICHE ──
function renderPratiche(){
  const el=document.getElementById('pratiche-list');if(!el)return;
  if(!state.pratiche.length){el.innerHTML='<div class="empty" style="padding:40px 0;text-align:center">Nessuna pratica. Creane una!</div>';return;}
  el.innerHTML=state.pratiche.map(p=>{
    const pagCV=p.payments.filter(x=>x.tipo==='compravendita');
    const pagMedV=p.payments.filter(x=>x.tipo==='med-vend');
    const pagMedA=p.payments.filter(x=>x.tipo==='med-acq');
    const pagSpese=p.payments.filter(x=>x.tipo==='spesa');
    const totCV=pagCV.reduce((a,x)=>a+x.amount,0);
    const totMedV=pagMedV.reduce((a,x)=>a+x.amount,0);
    const totMedA=pagMedA.reduce((a,x)=>a+x.amount,0);
    const saldoCV=(p.valore||0)-totCV;
    const lordoV=Math.round(p.valore*((p.pctMedVend||0)/100));const nettoV=Math.round(lordoV*((p.pctNettoVend||0)/100));
    const lordoA=Math.round(p.valore*((p.pctMedAcq||0)/100));const nettoA=Math.round(lordoA*((p.pctNettoAcq||0)/100));
    const totMedPrev=lordoV+lordoA;
    const dA=p.docsAcq.filter(d=>d.checked).length,dV=p.docsVend.filter(d=>d.checked).length;
    const totDoc=p.docsAcq.length+p.docsVend.length,doneDoc=dA+dV;
    const pctDoc=totDoc?Math.round(doneDoc/totDoc*100):0;

    let body='';
    if(p.open){
      const tabLabels={docs_vend:`Venditore (${dV}/${p.docsVend.length})`,docs_acq:`Acquirente (${dA}/${p.docsAcq.length})`,pagamenti:'Pagamenti'};
      const tabsHtml=Object.keys(tabLabels).map(t=>`<div class="ptab ${p.activeTab===t?'active':''}" onclick="setPraticaTab(${p.id},'${t}')">${tabLabels[t]}</div>`).join('');
      let content='';
      if(p.activeTab==='docs_vend'||p.activeTab==='docs_acq'){
        const type=p.activeTab==='docs_vend'?'vend':'acq';
        const arr=type==='vend'?p.docsVend:p.docsAcq;
        content=arr.map(d=>`<div class="doc-row">
          <div class="doc-check ${d.checked?'checked':''}" onclick="toggleDoc(${p.id},'${type}',${d.id})"></div>
          <span class="doc-label ${d.checked?'done':''}">${d.label}</span>
          <button class="doc-del" onclick="deleteDoc(${p.id},'${type}',${d.id})">✕</button>
        </div>`).join('');
        content+=`<button class="add-row" style="margin-top:8px;font-size:12px;color:var(--text-4);cursor:pointer;border:none;background:transparent;font-family:var(--font-sans)" onclick="openAddDoc(${p.id},'${type}')">＋ Aggiungi documento</button>`;
      } else {
        // ── MEDIAZIONE BOX ──
        content+=`<div class="med-box">
          <div class="med-box-title">Mediazioni — calcolo e note</div>
          <div class="med-party-grid">
            <div class="med-party">
              <div class="med-party-label" style="color:#2E6B2E">🟢 Venditore</div>
              <div class="med-field"><label>% Mediazione</label>
                <input id="med-pct-vend-${p.id}" type="number" value="${p.pctMedVend||''}" placeholder="4" min="0" step="0.1" oninput="updateMed(${p.id})">
              </div>
              <div style="font-size:12px;color:var(--text-3);margin:-4px 0 6px">= <span id="med-res-lv-${p.id}" style="font-family:var(--font-serif);color:var(--gold-dark)">€ ${fmtEur(lordoV)}</span></div>
              <div class="med-field"><label>% netto agente</label>
                <input id="med-netto-vend-${p.id}" type="number" value="${p.pctNettoVend||''}" placeholder="es. 50%" min="0" step="0.1" oninput="updateMed(${p.id})">
              </div>
              <div style="font-size:11px;color:var(--text-3);margin:-4px 0 8px"><span id="med-res-nv-${p.id}">${nettoV>0?'netto € '+fmtEur(nettoV):''}</span></div>
              <div class="med-field"><label>Note pagamento</label>
                <textarea class="med-note-input" id="med-note-vend-${p.id}" placeholder="Bonifico, contanti, data…" oninput="updateMed(${p.id})">${p.noteMedVend||''}</textarea>
              </div>
            </div>
            <div class="med-party">
              <div class="med-party-label" style="color:#2E4A8B">🔵 Acquirente</div>
              <div class="med-field"><label>% Mediazione</label>
                <input id="med-pct-acq-${p.id}" type="number" value="${p.pctMedAcq||''}" placeholder="4" min="0" step="0.1" oninput="updateMed(${p.id})">
              </div>
              <div style="font-size:12px;color:var(--text-3);margin:-4px 0 6px">= <span id="med-res-la-${p.id}" style="font-family:var(--font-serif);color:var(--gold-dark)">€ ${fmtEur(lordoA)}</span></div>
              <div class="med-field"><label>% netto agente</label>
                <input id="med-netto-acq-${p.id}" type="number" value="${p.pctNettoAcq||''}" placeholder="es. 50%" min="0" step="0.1" oninput="updateMed(${p.id})">
              </div>
              <div style="font-size:11px;color:var(--text-3);margin:-4px 0 8px"><span id="med-res-na-${p.id}">${nettoA>0?'netto € '+fmtEur(nettoA):''}</span></div>
              <div class="med-field"><label>Note pagamento</label>
                <textarea class="med-note-input" id="med-note-acq-${p.id}" placeholder="Bonifico, contanti, data…" oninput="updateMed(${p.id})">${p.noteMedAcq||''}</textarea>
              </div>
            </div>
          </div>
          <div class="med-totale-row">
            <span class="med-totale-label">Totale mediazione prevista</span>
            <span class="med-totale-val" id="med-tot-${p.id}">€ ${fmtEur(totMedPrev)}</span>
          </div>
        </div>`;

        // Pagamenti per tipo
        const tagLabel={compravendita:'Compravendita','med-vend':'Med. Venditore','med-acq':'Med. Acquirente',spesa:'Spesa'};
        const tagClass={compravendita:'tag-compravendita','med-vend':'tag-med-vend','med-acq':'tag-med-acq',spesa:'tag-spesa'};
        const gruppi=[
          {tipo:'compravendita',label:'Pagamenti compravendita',items:pagCV},
          {tipo:'med-vend',label:'Mediazione venditore',items:pagMedV},
          {tipo:'med-acq',label:'Mediazione acquirente',items:pagMedA},
          {tipo:'spesa',label:'Spese accessorie',items:pagSpese}
        ].filter(g=>g.items.length);
        content+=gruppi.map(g=>`<div class="section-divider">${g.label}</div>${g.items.map(pay=>`
          <div class="pay-row">
            <div class="pay-body">
              <div class="pay-desc">${pay.desc}</div>
              <div class="pay-meta">${pay.method} · ${fmtDate(pay.date)}</div>
              ${pay.note?`<div class="pay-note">${pay.note}</div>`:''}
            </div>
            <div class="pay-right">
              <span class="pay-tag ${tagClass[pay.tipo]}">${tagLabel[pay.tipo]}</span>
              <span class="pay-amt">€ ${fmtEur(pay.amount)}</span>
              <button class="pay-del" onclick="deletePayment(${p.id},${pay.id})">✕</button>
            </div>
          </div>`).join('')}`).join('');

        content+=`<div class="totale-section">
          <div class="totale-row" style="border-bottom:1px solid var(--bg-2);padding-bottom:8px;margin-bottom:4px">
            <span class="totale-label" style="font-weight:500;color:var(--text-2)">Prezzo compravendita</span>
            <span class="totale-val">€ ${fmtEur(p.valore)}</span>
          </div>
          <div class="totale-row"><span class="totale-label">Versato (compravendita)</span><span class="totale-val gold">€ ${fmtEur(totCV)}</span></div>
          ${saldoCV>0?`<div class="totale-row"><span class="totale-label">Saldo residuo</span><span class="totale-val red">€ ${fmtEur(saldoCV)}</span></div>`:`<div class="saldo-ok">Compravendita saldata ✓</div>`}
          ${totMedPrev>0?`<div class="totale-row" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bg-2)">
            <span class="totale-label">Mediazione prevista totale</span>
            <span class="totale-val" style="color:var(--gold-dark)">€ ${fmtEur(totMedPrev)}</span>
          </div>`:''}
          ${totMedV+totMedA>0?`<div class="totale-row"><span class="totale-label">Mediazione incassata</span><span class="totale-val green">€ ${fmtEur(totMedV+totMedA)}</span></div>`:''}
        </div>
        <div style="margin-top:12px"><button class="add-pratica-btn" onclick="openAddPayment(${p.id})">＋ Aggiungi pagamento</button></div>`;
      }
      body=`<div class="pratica-body"><div class="ptabs">${tabsHtml}</div><div class="ptab-content">${content}</div></div>`;
    }
    return`<div class="pratica-card">
      <div class="pratica-header" onclick="togglePraticaOpen(${p.id})">
        <div class="pratica-status ${p.status==='done'?'status-done':'status-open'}"></div>
        <div class="pratica-names">
          <div class="pratica-title">${p.venditore} <em>→</em> ${p.acquirente}</div>
          <div class="pratica-addr">${p.indirizzo||'Indirizzo non specificato'} · ${doneDoc}/${totDoc} doc · ${pctDoc}%</div>
        </div>
        <div class="pratica-right">
          <div class="pratica-val">€ ${fmtEur(p.valore)}</div>
          ${totMedPrev>0?`<div class="pratica-mediazione">Med. € ${fmtEur(totMedPrev)}</div>`:''}
        </div>
        <button onclick="event.stopPropagation();editPratica(${p.id})" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text-4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--tr)" title="Modifica pratica">✎</button>
        <span class="pratica-expand ${p.open?'open':''}">▶</span>
      </div>${body}
    </div>`;
  }).join('');
}

function editPratica(id){
  const p=state.pratiche.find(x=>x.id===id);if(!p)return;
  openModal(`<h3>Modifica pratica</h3>
    <div class="field"><label>Nome venditore</label><input id="ep-vend" value="${p.venditore}"></div>
    <div class="field"><label>Nome acquirente</label><input id="ep-acq" value="${p.acquirente}"></div>
    <div class="field"><label>Indirizzo immobile</label><input id="ep-addr" value="${p.indirizzo||''}"></div>
    <div class="field"><label>Prezzo compravendita (€)</label><input id="ep-val" type="number" value="${p.valore||''}" min="0"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>% Med. venditore</label><input id="ep-pv" type="number" value="${p.pctMedVend||''}" step="0.1" min="0"></div>
      <div class="field"><label>% Netto vend.</label><input id="ep-nv" type="number" value="${p.pctNettoVend||''}" step="0.1" min="0"></div>
      <div class="field"><label>% Med. acquirente</label><input id="ep-pa" type="number" value="${p.pctMedAcq||''}" step="0.1" min="0"></div>
      <div class="field"><label>% Netto acq.</label><input id="ep-na" type="number" value="${p.pctNettoAcq||''}" step="0.1" min="0"></div>
    </div>
    <div class="field" style="margin-top:6px">
      <label>Stato</label>
      <select id="ep-status">
        <option value="open" ${p.status==='open'?'selected':''}>Aperta</option>
        <option value="done" ${p.status==='done'?'selected':''}>Chiusa</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn-save" onclick="saveEditPratica(${id})">Salva</button>
    </div>`);
}

function saveEditPratica(id){
  const p=state.pratiche.find(x=>x.id===id);if(!p)return;
  const g=id=>document.getElementById(id);
  const vend=(g('ep-vend').value||'').trim();const acq=(g('ep-acq').value||'').trim();
  if(!vend||!acq)return;
  p.venditore=vend;p.acquirente=acq;
  p.indirizzo=(g('ep-addr').value||'').trim();
  p.valore=parseFloat(g('ep-val').value)||0;
  p.pctMedVend=parseFloat(g('ep-pv').value)||0;p.pctNettoVend=parseFloat(g('ep-nv').value)||0;
  p.pctMedAcq=parseFloat(g('ep-pa').value)||0;p.pctNettoAcq=parseFloat(g('ep-na').value)||0;
  p.percentualeMediazione=(p.pctMedVend+p.pctMedAcq)/2;
  p.status=g('ep-status').value;
  logEvent('pratica','Pratica modificata',p.venditore+' → '+p.acquirente);
  save();closeModal();renderPratiche();updateStats();
}

// ── CRONOLOGIA ──
function setCronoFilter(f,btn){
  cronoFilter=f;document.querySelectorAll('.crono-filter-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderCronologia();
}
function renderCronologia(){
  const el=document.getElementById('crono-list');if(!el)return;
  const filterToTipo={priorita:'priorita',pratiche:'pratica',documenti:'documento',pagamenti:'pagamento',todo:'todo'};
  const iconMap={priorita:{cls:'icon-priority',ico:'☑'},pratica:{cls:'icon-pratica',ico:'🏠'},documento:{cls:'icon-doc',ico:'📄'},pagamento:{cls:'icon-payment',ico:'€'},todo:{cls:'icon-todo',ico:'✔'}};
  let items=state.cronologia;
  if(cronoFilter!=='tutti'){const tipo=filterToTipo[cronoFilter];items=items.filter(x=>x.tipo===tipo);}
  if(!items.length){el.innerHTML=`<div class="crono-empty"><div style="font-size:32px;margin-bottom:10px">📋</div>Nessuna azione registrata.</div>`;return;}
  const todayStr=isoDate(nowDate());const yesterdayStr=isoDate(new Date(nowDate().getTime()-86400000));
  const byDay={};
  items.forEach(item=>{const k=isoDate(new Date(item.ts));if(!byDay[k])byDay[k]=[];byDay[k].push(item);});
  el.innerHTML=Object.entries(byDay).map(([day,evs])=>{
    const label=day===todayStr?'Oggi':day===yesterdayStr?'Ieri':fmtDate(day);
    const rows=evs.map(e=>{
      const ic=iconMap[e.tipo]||{cls:'icon-priority',ico:'•'};
      return`<div class="crono-item">
        <div class="crono-icon ${ic.cls}">${ic.ico}</div>
        <div class="crono-body"><div class="crono-title">${e.titolo}</div><div class="crono-meta">${e.dettaglio}</div></div>
        <div class="crono-time">${fmtTs(e.ts)}</div>
      </div>`;
    }).join('');
    return`<div class="crono-group"><div class="crono-group-title">${label}</div>${rows}</div>`;
  }).join('');
}

// ── INIT ──
document.getElementById('todo-main-date').value=isoDate(nowDate());
document.getElementById('add-pri-date').value=isoDate(nowDate());
updateDate();
renderAll();
</script>
